name: Publish to GitHub

on:
  push:
    branches:
      - main

jobs:
  publish:
    runs-on: ubuntu-latest

    container:
      image: ghcr.io/sqing33/gitea_actions_runner:latest

    steps:
      - name: Checkout Gitea repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Clean repository history with BFG
        shell: bash
        run: |
          set -e

          BFG_ARGS=()
          
          # 关键改动：添加 --no-blob-protection 参数
          # 这会告诉 BFG 清理所有提交，包括最新的 HEAD 提交
          BFG_ARGS+=(--no-blob-protection)

          # 处理要删除的文件列表
          if [ -f .bfg_delete_files ]; then
            FILES_TO_DELETE=$(grep -vE '^#|^$' .bfg_delete_files | tr '\n' ',' | sed 's/,$//')
            if [ -n "$FILES_TO_DELETE" ]; then
              BFG_ARGS+=(--delete-files "{$FILES_TO_DELETE}")
            fi
          fi

          # 处理要删除的文件夹列表
          if [ -f .bfg_delete_folders ]; then
            FOLDERS_TO_DELETE=$(grep -vE '^#|^$' .bfg_delete_folders | tr '\n' ',' | sed 's/,$//')
            if [ -n "$FOLDERS_TO_DELETE" ]; then
              BFG_ARGS+=(--delete-folders "{$FOLDERS_TO_DELETE}")
            fi
          fi

          # 检查除了 --no-blob-protection 之外是否还有其他清理参数
          if [ ${#BFG_ARGS[@]} -le 1 ]; then
            echo "No files or folders specified for cleanup. Skipping."
            exit 0
          fi

          echo "Cleaning repository with BFG. Arguments: ${BFG_ARGS[@]}"
          
          java -jar /usr/local/bin/bfg.jar "${BFG_ARGS[@]}" .
          
          echo "Compacting repository to physically remove cleaned objects..."
          git reflog expire --expire=now --all && git gc --prune=now --aggressive

      - name: Push cleaned repository to GitHub
        shell: bash
        run: |
          set -e
          
          echo "Pushing the cleaned repository to GitHub..."
          git remote set-url origin https://sqing33:${{ secrets.TOKEN }}@github.com/sqing33/Docker.pt-nexus.git
          git push --force --mirror
